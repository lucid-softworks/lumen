name: Release

# Pushing a version tag (e.g. v0.1.0 — release-plz creates these when the release PR merges) builds
# lumen in release mode for each supported platform and publishes a GitHub release with the binaries
# attached, named by target triple: lumen-<target-triple> (the bare engine shell) and
# lumen-cli-<target-triple> (the Node/Deno-style runtime users run programs with).
#
# Also dispatchable at a tag ref: tags created with the default GITHUB_TOKEN (release-plz's) do not
# fire `push` events, so release-plz.yml dispatches this workflow explicitly after tagging.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub release + upload assets

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ''
          - os: macos-15-intel
            target: x86_64-apple-darwin
            ext: ''
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: '.exe'
    runs-on: ${{ matrix.os }}
    # bash on every runner (Windows has git-bash) so the copy steps are one form everywhere.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p lumen --bin lumen
      - run: cargo build --release -p lumen-cli --bin lumen-cli
      - run: cp target/release/lumen${{ matrix.ext }} lumen-${{ matrix.target }}${{ matrix.ext }}
      - run: cp target/release/lumen-cli${{ matrix.ext }} lumen-cli-${{ matrix.target }}${{ matrix.ext }}
      - uses: actions/upload-artifact@v4
        with:
          name: lumen-${{ matrix.target }}
          path: lumen-${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: lumen-cli-${{ matrix.target }}
          path: lumen-cli-${{ matrix.target }}${{ matrix.ext }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
