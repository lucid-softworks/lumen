name: release-plz

# On every push to main, release-plz:
#   * opens/updates a "release" PR that bumps crate versions + writes CHANGELOGs from the
#     Conventional Commits since the last release, and
#   * once that PR is merged, creates the version tag — which triggers .github/workflows/release.yml
#     to build and publish the per-platform CLI binaries.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  actions: write   # dispatch release.yml for the tag it creates

concurrency:
  group: release-plz
  cancel-in-progress: false

jobs:
  release-plz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: release-plz/action@v0.5
        id: release-plz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Tags created above use GITHUB_TOKEN, whose events never start `push`-triggered workflows
      # (recursive-trigger protection) — so kick the Release build via workflow_dispatch, which is
      # exempt from that rule.
      - name: Trigger the Release workflow for the new tag
        if: steps.release-plz.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$(jq -r '.[0].tag' <<< '${{ steps.release-plz.outputs.releases }}')"
          gh workflow run release.yml --ref "$tag"
