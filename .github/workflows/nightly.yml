name: Nightly

# Builds the `lumen` CLI in release mode for each supported platform and publishes the binaries to
# a rolling `nightly` prerelease (the tag is recreated on every run). External consumers — e.g. the
# test262.fyi engine harness — download per-platform assets from
#   https://github.com/lucid-softworks/lumen/releases/download/nightly/lumen-<target-triple>
# and read the built commit from the release's target_commitish.
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p lumen --bin lumen
      - run: cp target/release/lumen lumen-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: lumen-${{ matrix.target }}
          path: lumen-${{ matrix.target }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Recreate the rolling nightly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --cleanup-tag || true
          # Tag deletion propagates asynchronously; give it a moment so the recreate lands on
          # $GITHUB_SHA instead of resurrecting the old tag.
          sleep 10
          gh release create nightly dist/* \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "nightly (${GITHUB_SHA:0:7})" \
            --notes "Automated nightly build of ${GITHUB_SHA}."
